<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #1a1a2e;
      margin: 0;
    }

    .card-wrapper {
      position: relative;
      width: 300px;
      height: 400px;
    }

    /* Задний блок — прозрачный с обводкой, смещён */
    .card-back {
      position: absolute;
      top: 0;
      left: 12px;
      width: 100%;
      height: 100%;
      border: 1.5px solid #00ff88;
      background: transparent;
      box-sizing: border-box;
    }

    /* Передний блок — тёмный фон со срезом */
    .card-front {
      position: absolute;
      top: 12px;
      left: 0;
      width: 100%;
      height: 100%;
      background: #0d0d1f;
      clip-path: polygon(0 0, 100% 0, 100% calc(100% - 40px), calc(100% - 40px) 100%, 0 100%);
      box-sizing: border-box;
    }

    /* SVG обводка поверх переднего блока */
    .card-border {
      position: absolute;
      top: 12px;
      left: 0;
      width: 100%;
      height: 100%;
      overflow: visible;
    }
  </style>
</head>
<body>

  <div class="card-wrapper">
    <!-- Задний блок -->
    <div class="card-back"></div>

    <!-- Передний блок (фон) -->
    <div class="card-front"></div>

    <!-- SVG обводка переднего блока -->
    <svg class="card-border" viewBox="0 0 300 400" preserveAspectRatio="none">
      <polygon
        points="0,0 300,0 300,360 260,400 0,400"
        fill="none"
        stroke="#00ff88"
        stroke-width="1.5"
      />
    </svg>
  </div>

</body>
</html>
